# hermes-manager agent definition
#
# Each agent is a hermes profile deployed to a VM in this org.
# The agent's email (<name>@<org.domains.agents>) is its permanent identity.
#
# Run `hm sync` to deploy changes.

name = "scout"
email = "xata-scout@paracord.run"
uid = "da47d8"
owner = "justin@paracord.co"

[gateway]
enabled = false
port = 0

[doppler]
project = "xata-paracord-keys"
config = "ops" # inferred from doppler token

# Persistent working copy of the runbook source repo. Synced to <branch>
# before every trigger entry the consumer processes — used by heal-style
# flows where scout needs the latest runbook source on disk. Auth uses
# the GitHub App credentials in this profile's .env (mint via `yard git
# mint-token`). See hermes-manager docs/scout-heal-loop.md.
[git]
repo = "paracord-clients/xatabase-finance-assistant"
# branch defaults to "main"
# path defaults to /home/hm-scout/repos/xatabase-finance-assistant

# Autonomous self-heal fix-run loop for the runbook trigger consumer. On a
# failed `wb` run, scout's `agent-chat` reviews the error output + runbook
# source, returns a corrected version, and the consumer re-runs it, up to
# max_fix_runs times before giving up (then the operator heal-pr path takes
# over). See hermes-manager docs/scout-heal-loop.md → "Automated fix-run loop".
[heal]
# enabled defaults to true when this block is present
max_fix_runs = 5

# Manager-owned model settings, rendered into the profile config.yaml on
# every `hm sync`. gpt-5.5 is the current Codex default recommendation and
# what this profile's config.yaml already runs; keeping it here makes the
# choice durable across resyncs. Codex auth lives on the droplet
# (`hm agent auth codex --name scout`), not in .env.
[model]
provider = "openai-codex"
default = "gpt-5.5"