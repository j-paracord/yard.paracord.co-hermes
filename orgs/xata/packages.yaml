# System-wide packages installed on every VM in this org by `hm sync`.
#
# Three ways to declare a package:
#
# 1. Built-in recipe — just name it. Known names:
#      gh, nodejs, uv, docker, python3, jq, ripgrep, build-essential, git, curl
#
# 2. Arbitrary apt package — set `type: apt` and we'll `apt-get install <name>`:
#      - name: postgresql-client
#        type: apt
#
# 3. Custom installer — supply `install`, `check`, and optionally `upgrade_cmd`.
#    `check` should exit 0 when the tool is already present.
#
# Set `upgrade: true` to try to upgrade on every sync. Otherwise packages are
# "install-if-missing". Use `hm sync --upgrade-packages` for a one-off
# upgrade of everything without editing this file.

packages:
  - name: git
  - name: curl
  - name: jq
  - name: ripgrep
  - name: build-essential
  - name: ffmpeg
    type: apt

  - name: gh

  - name: nodejs

  # Enables per-agent docker sandbox. During sync every agent's Linux user
  # gets added to the `docker` group so it can `docker run` from its tool
  # layer. Remove this entry if you don't want agents to have docker access.
  - name: docker

  - name: doppler
    type: script
    install: |
      # Install pre-reqs
      sudo apt-get update && sudo apt-get install -y apt-transport-https ca-certificates curl gnupg

      # Add Doppler's GPG key
      curl -sLf --retry 3 --tlsv1.2 --proto "=https" 'https://packages.doppler.com/public/cli/gpg.DE2A7741A397C129.key' | sudo apt-key add -

      # Add Doppler's apt repo
      echo "deb https://packages.doppler.com/public/cli/deb/debian any-version main" | sudo tee /etc/apt/sources.list.d/doppler-cli.list

      # Fetch and install latest doppler cli
      sudo apt-get update && sudo apt-get install -y doppler
    check: command -v doppler
    

  - name: paracord-inbox
    type: script
    install: curl -fsSL https://inbox.paracord.co/install.sh | INBOX_INSTALL_DIR=/usr/local/bin sh 
    check: command -v inbox

  - name: workbooks
    type: script
    install: curl -fsSL https://get.workbooks.dev | WB_INSTALL_DIR=/usr/local/bin sh
    check: command -v wb
    upgrade: true
    upgrade_cmd: WB_INSTALL_DIR=/usr/local/bin wb update

  # Node sidecar for wb's `browser` runtime (Browserbase-backed). Pulls in
  # `playwright-core` (JS only — no browser binaries). Requires `nodejs`
  # above for `npm`.`
  - name: wb-browser-runtime

  # Local Chromium + system deps for Playwright. Opt-in fallback so we
  # aren't fully dependent on Browserbase. Adds ~500MB–1GB and a long apt
  # list; only enable on VMs that need it. Agents must set
  # PLAYWRIGHT_BROWSERS_PATH=/usr/local/share/ms-playwright in their .env
  # to pick up the shared install.
  # - name: playwright-chromium

  - name: uv
    # Spelled out as an example of a custom script entry. Equivalent to just
    # `- name: uv` since `uv` is in the built-in recipe registry.
    type: script
    install: curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin sh
    check: command -v uv
    upgrade_cmd: uv self update