model:
  default: "gpt-5.5"
  provider: "openai-codex"

fallback_model:
  model: "anthropic/claude-haiku-4-5"
  provider: "openrouter"

# =============================================================================
# Terminal (command execution backend)
# =============================================================================
# Backends: local | ssh | docker | singularity | modal | daytona
# For droplet-deployed agents, `local` runs commands directly on the VM.
terminal:
  backend: "local"
  cwd: "."            # "." = wherever hermes is launched from
  timeout: 180        # per-command timeout (seconds)
  lifetime_seconds: 300

# =============================================================================
# Agent behavior
# =============================================================================
agent:
  max_turns: 60             # tool-calling iterations per conversation
  reasoning_effort: "medium"  # xhigh | high | medium | low | minimal | none
  # verbose: false
  # gateway_timeout: 1800       # idle timeout for gateway runs (0 = unlimited)
  # restart_drain_timeout: 60   # graceful drain on gateway stop/restart

# =============================================================================
# Toolsets (per-platform)
# =============================================================================
# Top-level `tools:` is NOT a valid hermes key — it is ignored.
# Instead configure tools per platform via `platform_toolsets`.
# Presets: hermes-cli, hermes-telegram, hermes-discord, hermes-whatsapp,
#          hermes-slack, hermes-signal, hermes-homeassistant.
# Individual toolsets: web, search, terminal, file, browser, vision, image_gen,
#          skills, skills_hub, moa, todo, tts, cronjob, rl.
# Composites: debugging (terminal+web+file), safe (web+vision+moa), all.
platform_toolsets:
  cli: [hermes-cli]
  telegram: [hermes-telegram]
  discord: [hermes-discord]
  slack: [hermes-slack]

# =============================================================================
# Optional sections (uncomment + edit as needed)
# =============================================================================
platforms:
  slack:
    reply_to_mode: "first"
    extra:
      reply_in_thread: false
      reply_broadcast: false
